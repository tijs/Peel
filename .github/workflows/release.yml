name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        # The project targets the Xcode 26 toolchain (Swift 6 strict concurrency,
        # approachable-concurrency build settings). The runner's default Xcode is
        # 16.x, which is too old, so select the newest installed Xcode 26.
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP"
          xcodebuild -version

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build, package, and notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          SIGNING_IDENTITY: Developer ID Application
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x scripts/release/*.sh
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          export APPLE_API_PRIVATE_KEY_PATH="$PRIVATE_KEY_PATH"
          scripts/release/release.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION#v}"
          TAG="v$VERSION"
          DMG="dist/Peel-$VERSION.dmg"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" "$DMG.sha256" --clobber
          else
            gh release create "$TAG" "$DMG" "$DMG.sha256" \
              --title "Peel $VERSION" \
              --notes-file CHANGELOG.md
          fi
